name: Stock Bot

on:
  schedule:
    # KST 기준 평일 장중 5회 스캔 (UTC 표기)
    - cron: '0 0 * * 1-5'    # KST 09:00 장 시작
    - cron: '30 1 * * 1-5'   # KST 10:30
    - cron: '0 3 * * 1-5'    # KST 12:00 점심
    - cron: '30 4 * * 1-5'   # KST 13:30
    - cron: '0 6 * * 1-5'    # KST 15:00 장 마감 전
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          pip install finance-datareader
          pip install feedparser
          pip install requests
          pip install pandas

      - name: 봇 실행
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py
