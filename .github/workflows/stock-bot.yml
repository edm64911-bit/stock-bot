name: Stock Bot
on:
  schedule:
    - cron: '0 0 * * 1-5'    # KST 09:00
    - cron: '0 2 * * 1-5'    # KST 11:00
    - cron: '0 4 * * 1-5'    # KST 13:00
    - cron: '0 6 * * 1-5'    # KST 15:00
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 라이브러리 설치
        run: |
          pip install finance-datareader feedparser requests pandas
      - name: 봇 실행
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py
