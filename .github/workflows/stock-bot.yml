name: Stock Bot

on:
  schedule:
    - cron: '0 0 * * 1-5'     # KST 09:00 주식 스캔
    - cron: '0 2 * * 1-5'     # KST 11:00 주식 스캔
    - cron: '0 4 * * 1-5'     # KST 13:00 주식 스캔
    - cron: '0 6 * * 1-5'     # KST 15:00 주식 스캔
    - cron: '30 0 * * 1-5'    # KST 09:30 주식 추적
    - cron: '30 2 * * 1-5'    # KST 11:30 주식 추적
    - cron: '30 4 * * 1-5'    # KST 13:30 주식 추적
    - cron: '30 6 * * 1-5'    # KST 15:30 주식 추적
    - cron: '0 22 * * 0'      # KST 일요일 07:00 백테스트
    - cron: '0 */2 * * *'     # 2시간마다 코인 스캔
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stock-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 0 * * 1-5' ||
      github.event.schedule == '0 2 * * 1-5' ||
      github.event.schedule == '0 4 * * 1-5' ||
      github.event.schedule == '0 6 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install finance-datareader feedparser requests pandas ccxt
      - name: 주식 스캐너 실행
        env:
          WEBHOOK_STOCK:        ${{ secrets.WEBHOOK_STOCK }}
          WEBHOOK_STOCK_WEEKLY: ${{ secrets.WEBHOOK_STOCK_WEEKLY }}
        run: python main.py
      - name: 결과 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add scan_*.json scanner_*.log positions.json || true
          git diff --cached --quiet || git commit -m "scan $(date +'%Y%m%d_%H%M')"
          git push || true

  stock-track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      github.event.schedule == '30 0 * * 1-5' ||
      github.event.schedule == '30 2 * * 1-5' ||
      github.event.schedule == '30 4 * * 1-5' ||
      github.event.schedule == '30 6 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install finance-datareader requests pandas
      - name: 주식 추적 실행
        env:
          WEBHOOK_STOCK: ${{ secrets.WEBHOOK_STOCK }}
        run: python tracker.py
      - name: 결과 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add positions.json tracker_*.log || true
          git diff --cached --quiet || git commit -m "track $(date +'%Y%m%d_%H%M')"
          git push || true

  coin-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 */2 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas
      - name: 코인 스캐너 실행
        env:
          WEBHOOK_COIN: ${{ secrets.WEBHOOK_COIN }}
        run: python coin.py
      - name: 결과 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add coin_*.json coin_*.log coin_alert_cache.json || true
          git diff --cached --quiet || git commit -m "coin $(date +'%Y%m%d_%H%M')"
          git push || true

  backtest:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 22 * * 0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install finance-datareader requests pandas
      - name: 백테스트 실행
        env:
          WEBHOOK_STOCK_WEEKLY: ${{ secrets.WEBHOOK_STOCK_WEEKLY }}
        run: python backtest.py
