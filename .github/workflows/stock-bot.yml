name: Stock Bot

on:
  schedule:
    - cron: '0 0,3,6,9,12 * * *'

  workflow_dispatch:

jobs:
  run-bot:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          pip install finance-datareader
          pip install yfinance
          pip install feedparser
          pip install requests
          pip install pandas
          pip install numpy

      - name: 봇 실행
        run: python main.py
